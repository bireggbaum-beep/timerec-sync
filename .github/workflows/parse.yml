name: TimeRec Parse

on:
  push:
    paths:
      - "backup/timerec.db.gz"
  workflow_dispatch: # Manueller Trigger

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse SQLite → JSON
        run: python3 sync.py

      - name: Commit JSON
        run: |
          git config user.name "TimeRec Bot"
          git config user.email "bot@timerec.local"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            STATS=$(python3 -c "import json; d=json.load(open('data/meta.json')); print(f\"{d['totalStamps']} stamps, {d['totalDays']} days\")")
            git commit -m "data: ${STATS}"
            git push
          fi

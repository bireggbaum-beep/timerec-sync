services:
  couchdb:
    image: couchdb:3
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:?COUCHDB_PASSWORD required}
    volumes:
      - couchdb_data:/opt/couchdb/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./app/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - couchdb
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://localhost:80
    network_mode: host
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  couchdb_data:

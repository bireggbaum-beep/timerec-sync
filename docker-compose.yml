services:
  couchdb:
    image: couchdb:3
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:?COUCHDB_PASSWORD required}
    volumes:
      - couchdb_data:/opt/couchdb/data
      - ./couchdb/local.ini:/opt/couchdb/etc/local.d/local.ini:ro
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./app/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data:/usr/share/nginx/html/data:ro
    ports:
      - "80:80"
    depends_on:
      - couchdb
    restart: unless-stopped

  # Cloudflare Tunnel für HTTPS-Zugriff ohne eigenes Zertifikat
  # Quick Tunnel (ohne Account): zufällige URL, Interstitial-Seite
  # Für Named Tunnel (stabile URL, kein Interstitial):
  #   1. Kostenlosen Cloudflare-Account erstellen
  #   2. cloudflared tunnel login
  #   3. cloudflared tunnel create timerec
  #   4. command ändern zu: tunnel run timerec
  #   5. ./cloudflared/config.yml mounten mit Tunnel-Config
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://localhost:80
    network_mode: host
    restart: unless-stopped

volumes:
  couchdb_data:
